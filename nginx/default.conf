server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;

    # Serve static files (admin.html, etc.)
    location / {
        try_files $uri $uri/ =404;
    }

    # Proxy HA REST API — HA_TOKEN is injected at the proxy layer.
    # The browser never sees the token; admin.html calls /ha-api/* directly.
    location /ha-api/ {
        proxy_pass http://localhost:8123/api/;
        proxy_set_header Authorization "Bearer ${HA_TOKEN}";
        proxy_set_header Content-Type "application/json";
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 15s;
        proxy_connect_timeout 5s;
    }
}
