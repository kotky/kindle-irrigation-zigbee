homeassistant: true

mqtt:
  base_topic: zigbee2mqtt
  # In HA OS, the Mosquitto broker addon is reachable at core-mosquitto:1883
  server: mqtt://core-mosquitto:1883
  user: zigbee2mqtt
  password: !secret z2m_mqtt_password

serial:
  port: /dev/ttyUSB0

frontend:
  port: 8080

permit_join: true   # Set to false after all devices are paired

advanced:
  log_level: info
  network_key: GENERATE
