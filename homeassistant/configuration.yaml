default_config:

# HA OS: the Mosquitto broker addon listens on localhost:1883.
# Credentials are managed via the Mosquitto addon → Logins section.
mqtt:
  broker: localhost
  port: 1883
  username: !secret mqtt_user
  password: !secret mqtt_password

input_boolean:
  rain_detected:
    name: "Rain Detected"
    icon: mdi:weather-rainy

# Zone config helpers — pre-seeded with zone 1.
# Additional zones are created via the admin UI at http://HA:8123/local/admin.html
input_text:
  zone_1_name:
    name: "Zone 1 Name"
    initial: "Zone 1"
  zone_1_soil:
    name: "Zone 1 Soil Entity"
    initial: ""
  zone_1_valve:
    name: "Zone 1 Valve Entity"
    initial: ""
  zone_1_threshold:
    name: "Zone 1 Moisture Threshold"
    initial: "30"

  # LLM irrigation summary — updated hourly by the Ollama automation
  irrigation_summary:
    name: "Irrigation Summary"
    max: 255
    initial: "Summary pending first hourly run..."

# REST command for Ollama inference (used by the hourly summary automation).
# Requires the Ollama addon to be running with qwen2.5:1.5b pulled.
rest_command:
  ollama_summary:
    url: "http://localhost:11434/api/generate"
    method: POST
    content_type: "application/json"
    payload: >-
      {"model": "qwen2.5:1.5b", "prompt": "{{ prompt }}", "stream": false}
    timeout: 120

automation: !include automations.yaml
